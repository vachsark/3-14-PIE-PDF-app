    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;

      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
